<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - UMJemberSoft</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f5f2eb;
            --surface: #ffffff;
            --border: #e8e2d6;
            --ink: #1a1612;
            --ink-2: #4a4440;
            --accent: #2b6cb0;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --radius: 14px;
        }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--ink);
            margin: 0;
            padding: 0;
        }
        .nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-brand { font-weight: 800; color: var(--accent); font-size: 1.2rem; }
        .nav-user { display: flex; align-items: center; gap: 20px; }
        .nav-user span { font-weight: 600; font-size: 0.9rem; }
        .btn-logout { color: #dc3545; font-weight: 600; text-decoration: none; font-size: 0.9rem; cursor: pointer; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .header { margin-bottom: 32px; }
        .header h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .header p { color: var(--ink-2); }

        .upload-section {
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 40px;
        }
        .upload-section h2 { font-size: 1.2rem; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
        }
        .btn-submit {
            grid-column: span 2;
            padding: 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

        .project-list h2 { font-size: 1.2rem; margin-bottom: 20px; }
        .project-card {
            background: var(--surface);
            padding: 20px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .project-info h3 { margin: 0 0 8px 0; font-size: 1rem; }
        .project-info p { margin: 0; font-size: 0.85rem; color: var(--ink-2); }
        .project-files { font-size: 0.8rem; color: var(--accent); font-weight: 600; }
        .project-files a { color: var(--accent); text-decoration: none; margin-left: 10px; border-bottom: 1px solid; }

        .loading { text-align: center; padding: 20px; font-style: italic; color: var(--ink-3); }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">UMJemberSoft</div>
        <div class="nav-user">
            <span id="userNameDisplay">Halo, Mahasiswa!</span>
            <a id="logoutBtn" class="btn-logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>Dashboard Mahasiswa</h1>
            <p>Kelola proyek source code dan database Anda di sini.</p>
        </div>

        <div class="upload-section">
            <h2>Unggah Proyek Baru</h2>
            <form id="uploadForm">
                <div class="form-grid">
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Judul Proyek</label>
                        <input type="text" id="title" class="form-control" required>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Deskripsi Singkat</label>
                        <textarea id="description" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Source Code (ZIP)</label>
                        <input type="file" id="sourceCode" class="form-control" accept=".zip" required>
                    </div>
                    <div class="form-group">
                        <label>Database (SQL)</label>
                        <input type="file" id="databaseSql" class="form-control" accept=".sql" required>
                    </div>
                </div>
                <button type="submit" id="submitBtn" class="btn-submit">Simpan Proyek</button>
            </form>
        </div>

        <div class="project-list">
            <h2>Proyek Saya</h2>
            <div id="loading" class="loading">Memuat proyek...</div>
            <div id="projectsContainer"></div>
        </div>
    </div>

    <script src="supabase-client.js"></script>
    <script>
        const uploadForm = document.getElementById('uploadForm');
        const projectsContainer = document.getElementById('projectsContainer');
        const loading = document.getElementById('loading');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const logoutBtn = document.getElementById('logoutBtn');
        const submitBtn = document.getElementById('submitBtn');

        let currentUser = null;

        // AUTH CHECK
        async function checkUser() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = session.user;
            userNameDisplay.innerText = `Halo, ${currentUser.user_metadata.full_name || 'Mahasiswa'}!`;
            loadProjects();
        }
        checkUser();

        // LOGOUT
        logoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        });

        // LOAD PROJECTS
        async function loadProjects() {
            loading.style.display = 'block';
            projectsContainer.innerHTML = '';

            const { data, error } = await supabase
                .from('projects')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });

            loading.style.display = 'none';

            if (error) {
                projectsContainer.innerHTML = '<p>Gagal memuat proyek.</p>';
                return;
            }

            if (data.length === 0) {
                projectsContainer.innerHTML = '<p>Belum ada proyek yang diunggah.</p>';
                return;
            }

            data.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <div class="project-info">
                        <h3>${project.title}</h3>
                        <p>${project.description || ''}</p>
                        <small>${new Date(project.created_at).toLocaleString('id-ID')}</small>
                    </div>
                    <div class="project-files">
                        <a href="${project.source_file_url}" target="_blank">Source ZIP</a>
                        <a href="${project.db_file_url}" target="_blank">Database SQL</a>
                    </div>
                `;
                projectsContainer.appendChild(card);
            });
        }

        // UPLOAD LOGIC
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const sourceFile = document.getElementById('sourceCode').files[0];
            const dbFile = document.getElementById('databaseSql').files[0];

            if (!sourceFile || !dbFile) return;

            submitBtn.disabled = true;
            submitBtn.innerText = 'Mengunggah file...';

            try {
                // 1. Upload ZIP to Storage
                const sourceFileName = `${Date.now()}_${sourceFile.name}`;
                const { data: sourceData, error: sourceError } = await supabase.storage
                    .from('project-files')
                    .upload(`sources/${sourceFileName}`, sourceFile);

                if (sourceError) throw sourceError;
                const sourceUrl = supabase.storage.from('project-files').getPublicUrl(`sources/${sourceFileName}`).data.publicUrl;

                // 2. Upload SQL to Storage
                const dbFileName = `${Date.now()}_${dbFile.name}`;
                const { data: dbData, error: dbError } = await supabase.storage
                    .from('project-files')
                    .upload(`databases/${dbFileName}`, dbFile);

                if (dbError) throw dbError;
                const dbUrl = supabase.storage.from('project-files').getPublicUrl(`databases/${dbFileName}`).data.publicUrl;

                // 3. Save Record to Database
                const { error: insertError } = await supabase
                    .from('projects')
                    .insert([
                        { 
                            user_id: currentUser.id,
                            title: title,
                            description: description,
                            source_file_url: sourceUrl,
                            db_file_url: dbUrl
                        }
                    ]);

                if (insertError) throw insertError;

                alert('Proyek berhasil diunggah!');
                uploadForm.reset();
                loadProjects();

            } catch (error) {
                console.error(error);
                alert('Gagal mengunggah proyek: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Simpan Proyek';
            }
        });
    </script>
</body>
</html>
