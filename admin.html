<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - UMJemberSoft</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f5f2eb;
            --surface: #ffffff;
            --border: #e8e2d6;
            --ink: #1a1612;
            --ink-2: #4a4440;
            --accent: #c05621; /* Admin theme: Warm Amber */
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --radius: 14px;
        }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--ink);
            margin: 0;
            padding: 0;
        }
        .nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-brand { font-weight: 800; color: var(--accent); font-size: 1.2rem; }
        .nav-user { display: flex; align-items: center; gap: 20px; }
        .btn-logout { color: #dc3545; font-weight: 600; text-decoration: none; font-size: 0.9rem; cursor: pointer; }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .header { margin-bottom: 32px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.8rem; margin: 0; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--surface); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); text-align: center; }
        .stat-val { font-size: 2rem; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 0.85rem; color: var(--ink-2); font-weight: 600; }

        .table-container { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #faf8f5; padding: 16px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 700; color: var(--ink-2); }
        td { padding: 16px; border-bottom: 1px solid var(--border); }
        tr:hover { background: #fdfcf9; }

        .btn-delete { background: #fee2e2; color: #b91c1c; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.8rem; }
        .btn-delete:hover { background: #fecaca; }
        .btn-download { color: var(--accent); text-decoration: none; font-weight: 600; margin-right: 10px; border-bottom: 1px solid; font-size: 0.8rem; }

        .loading { text-align: center; padding: 40px; font-style: italic; color: var(--ink-2); }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">UMJemberSoft Admin</div>
        <div class="nav-user">
            <span>Panel Administrator</span>
            <a href="dashboard.html" style="font-size: 0.9rem; font-weight: 600; text-decoration: none; color: #2b6cb0;">Kembali ke Dashboard</a>
            <a id="logoutBtn" class="btn-logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>Manajemen Semua Proyek</h1>
            <p id="totalCount">Total: 0 Proyek</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-val" id="statProjects">0</div>
                <div class="stat-label">Proyek Diunggah</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="statUsers">-</div>
                <div class="stat-label">Status Server</div>
            </div>
        </div>

        <div class="table-container">
            <div id="loading" class="loading">Memuat semua data proyek...</div>
            <table id="adminTable" style="display:none;">
                <thead>
                    <tr>
                        <th>Judul Proyek</th>
                        <th>User ID</th>
                        <th>Tanggal</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="projectsBody"></tbody>
            </table>
        </div>
    </div>

    <script src="supabase-client.js"></script>
    <script>
        const projectsBody = document.getElementById('projectsBody');
        const loading = document.getElementById('loading');
        const adminTable = document.getElementById('adminTable');
        const statProjects = document.getElementById('statProjects');
        const totalCount = document.getElementById('totalCount');
        const logoutBtn = document.getElementById('logoutBtn');

        // ADMIN ACCESS CHECK
        async function checkAdmin() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }

            // Check if user is admin via metadata or specific email
            const isAdmin = session.user.user_metadata.role === 'admin' || session.user.email === 'admin@umjember.ac.id';
            
            if (!isAdmin) {
                alert('Akses ditolak. Anda bukan Administrator.');
                window.location.href = 'dashboard.html';
                return;
            }

            loadAllProjects();
        }
        checkAdmin();

        // LOGOUT
        logoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        });

        // LOAD ALL PROJECTS
        async function loadAllProjects() {
            loading.style.display = 'block';
            adminTable.style.display = 'none';
            projectsBody.innerHTML = '';

            const { data, error } = await supabase
                .from('projects')
                .select('*')
                .order('created_at', { ascending: false });

            loading.style.display = 'none';

            if (error) {
                projectsBody.innerHTML = '<tr><td colspan="4" class="loading">Gagal memuat proyek: ' + error.message + '</td></tr>';
                adminTable.style.display = 'table';
                return;
            }

            statProjects.innerText = data.length;
            totalCount.innerText = `Total: ${data.length} Proyek`;
            adminTable.style.display = 'table';

            if (data.length === 0) {
                projectsBody.innerHTML = '<tr><td colspan="4" class="loading">Belum ada proyek di sistem.</td></tr>';
                return;
            }

            data.forEach(project => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <strong>${project.title}</strong><br>
                        <small style="color:#888">${project.description || '-'}</small>
                    </td>
                    <td><small>${project.user_id}</small></td>
                    <td>${new Date(project.created_at).toLocaleDateString()}</td>
                    <td>
                        <a href="${project.source_file_url}" class="btn-download" target="_blank">ZIP</a>
                        <a href="${project.db_file_url}" class="btn-download" target="_blank">SQL</a>
                        <button class="btn-delete" onclick="deleteProject('${project.id}')">Hapus</button>
                    </td>
                `;
                projectsBody.appendChild(tr);
            });
        }

        // DELETE PROJECT
        async function deleteProject(id) {
            if (!confirm('Apakah Anda yakin ingin menghapus proyek ini secara permanen?')) return;

            const { error } = await supabase
                .from('projects')
                .delete()
                .eq('id', id);

            if (error) {
                alert('Gagal menghapus: ' + error.message);
            } else {
                alert('Proyek berhasil dihapus.');
                loadAllProjects();
            }
        }
    </script>
</body>
</html>
