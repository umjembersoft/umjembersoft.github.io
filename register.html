<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - UMJemberSoft</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f5f2eb;
            --surface: #ffffff;
            --border: #e8e2d6;
            --ink: #1a1612;
            --accent: #2b6cb0;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --radius: 14px;
        }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--ink);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .wrapper {
            width: 400px;
            padding: 40px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: 0 8px 40px rgba(26,22,18,.12);
            border: 1px solid var(--border);
        }
        h2 { text-align: center; margin-bottom: 24px; color: var(--accent); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
        }
        .form-control:focus { outline: none; border-color: var(--accent); }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-primary:hover { background: #1a4a80; }
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            display: none;
        }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        p { text-align: center; margin-top: 16px; font-size: 0.85rem; }
        a { color: var(--accent); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="wrapper">
        <h2>Daftar Akun</h2>
        <div id="alert" class="alert"></div>
        <form id="registerForm">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="fullname" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required minlength="6">
            </div>
            <div class="form-group">
                <button type="submit" class="btn-primary" id="submitBtn">Daftar</button>
            </div>
            <p>Sudah punya akun? <a href="login.html">Login di sini</a>.</p>
        </form>
    </div>

    <script src="supabase-client.js"></script>
    <script>
        const registerForm = document.getElementById('registerForm');
        const alertBox = document.getElementById('alert');
        const submitBtn = document.getElementById('submitBtn');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullname = document.getElementById('fullname').value;

            submitBtn.disabled = true;
            submitBtn.innerText = 'Memproses...';
            alertBox.style.display = 'none';

            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: fullname
                    }
                }
            });

            if (error) {
                alertBox.innerText = error.message;
                alertBox.className = 'alert alert-error';
                alertBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerText = 'Daftar';
            } else {
                alertBox.innerText = 'Pendaftaran berhasil! Silakan cek email Anda untuk konfirmasi (jika diaktifkan) atau langsung login.';
                alertBox.className = 'alert alert-success';
                alertBox.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            }
        });
    </script>
</body>
</html>
